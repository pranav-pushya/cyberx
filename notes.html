<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>CyberX — Notes</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
.hud-panel{position:fixed;font-size:9px;letter-spacing:1px;color:rgba(0,229,255,.4);line-height:2;pointer-events:none;z-index:50;}
.hud-panel.tl{top:50px;left:14px;}
.hud-panel.tr{top:50px;right:14px;text-align:right;}
.hud-label{color:rgba(0,229,255,.2);font-size:8px;letter-spacing:3px;margin-bottom:2px;}
.hud-val{color:#00e5ff;}.hud-val.g{color:#00ff41;}.hud-val.r{color:#ff003c;}.hud-val.y{color:#ffd700;}.hud-val.p{color:#bd93f9;}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.012) 2px,rgba(0,255,65,.012) 4px);}
.vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,4,10,.8) 100%);}
.cx-tl,.cx-tr,.cx-bl,.cx-br{position:fixed;width:18px;height:18px;pointer-events:none;z-index:50;opacity:.3;}
.cx-tl{top:50px;left:6px;border-top:1px solid #00e5ff;border-left:1px solid #00e5ff;}
.cx-tr{top:50px;right:6px;border-top:1px solid #00e5ff;border-right:1px solid #00e5ff;}
.cx-bl{bottom:62px;left:6px;border-bottom:1px solid #00e5ff;border-left:1px solid #00e5ff;}
.cx-br{bottom:62px;right:6px;border-bottom:1px solid #00e5ff;border-right:1px solid #00e5ff;}
.mini-radar-wrap{position:fixed;top:48px;right:14px;z-index:51;pointer-events:none;opacity:.7;}
.wave-bars{display:flex;align-items:flex-end;gap:1px;height:24px;opacity:.3;position:fixed;z-index:50;}
.wave-bars.wl{bottom:62px;left:14px;}.wave-bars.wr{bottom:62px;right:14px;}

/* Category Colors */
:root {
  --color-commands: #00ff41;
  --color-tools: #00e5ff;
  --color-concepts: #ff003c;
  --color-osint: #ffd700;
  --color-personal: #bd93f9;
}

/* Category Chips */
.cx-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.cx-chip {
  padding: 6px 12px;
  background: rgba(0, 229, 255, 0.04);
  border: 1px solid rgba(0, 229, 255, 0.15);
  color: rgba(0, 229, 255, 0.6);
  font-family: var(--font);
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 2px;
}
.cx-chip:hover {
  background: rgba(0, 229, 255, 0.08);
  border-color: rgba(0, 229, 255, 0.4);
  color: #00e5ff;
}
.cx-chip.active {
  background: rgba(0, 229, 255, 0.16);
  border-color: #00e5ff;
  color: #00e5ff;
  box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
}

/* Search bar styling */
.search-container {
  margin-bottom: 20px;
  position: relative;
}
.search-input {
  width: 100%;
  padding: 10px 14px 10px 34px;
  background: rgba(0, 4, 10, 0.8);
  border: 1px solid var(--border2);
  color: #fff;
  font-family: var(--font);
  font-size: 12px;
  letter-spacing: 1px;
  border-radius: 2px;
  transition: all 0.3s;
  box-sizing: border-box;
}
.search-input:focus {
  border-color: #00e5ff;
  box-shadow: 0 0 8px rgba(0, 229, 255, 0.15);
  outline: none;
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  stroke: rgba(0, 229, 255, 0.4);
  fill: none;
  stroke-width: 2;
  pointer-events: none;
}

/* Add Note Form Collapsible */
.form-header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  margin-bottom: 14px;
  padding: 8px 0;
  border-bottom: 1px dashed rgba(0, 229, 255, 0.15);
}
.form-title-label {
  font-family: var(--hud);
  font-size: 11px;
  letter-spacing: 2px;
  color: #00e5ff;
}
.form-toggle-btn {
  background: transparent;
  border: 1px solid rgba(0, 229, 255, 0.3);
  color: #00e5ff;
  font-size: 10px;
  padding: 3px 8px;
  font-family: var(--font);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.form-toggle-btn:hover {
  background: rgba(0, 229, 255, 0.1);
  box-shadow: 0 0 6px rgba(0, 229, 255, 0.2);
}
.form-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s cubic-bezier(0, 1, 0, 1);
  margin-bottom: 0px;
}
.form-body.expanded {
  max-height: 500px;
  transition: max-height 0.4s ease-in-out;
  margin-bottom: 20px;
}
.form-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
@media (max-width: 600px) {
  .form-grid {
    grid-template-columns: 1fr;
  }
}
.form-input, .form-select, .form-textarea {
  background: rgba(0, 4, 10, 0.9);
  border: 1px solid var(--border2);
  color: #fff;
  font-family: var(--font);
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 2px;
  transition: border-color 0.2s;
  box-sizing: border-box;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: #00e5ff;
  outline: none;
}
.form-textarea {
  width: 100%;
  min-height: 100px;
  resize: vertical;
  margin-bottom: 12px;
  line-height: 1.5;
}

/* Note Cards Styling */
.notes-container {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.note-card {
  position: relative;
  border-left-width: 3px !important;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}
.note-card.category-commands { border-left-color: var(--color-commands) !important; }
.note-card.category-tools { border-left-color: var(--color-tools) !important; }
.note-card.category-concepts { border-left-color: var(--color-concepts) !important; }
.note-card.category-osint { border-left-color: var(--color-osint) !important; }
.note-card.category-personal { border-left-color: var(--color-personal) !important; }

/* Badge styles */
.badge {
  display: inline-block;
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 2px;
  font-family: var(--hud);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.badge.commands { background: rgba(0, 255, 65, 0.15); color: var(--color-commands); border: 1px solid rgba(0, 255, 65, 0.25); }
.badge.tools { background: rgba(0, 229, 255, 0.15); color: var(--color-tools); border: 1px solid rgba(0, 229, 255, 0.25); }
.badge.concepts { background: rgba(255, 0, 60, 0.15); color: var(--color-concepts); border: 1px solid rgba(255, 0, 60, 0.25); }
.badge.osint { background: rgba(255, 215, 0, 0.15); color: var(--color-osint); border: 1px solid rgba(255, 215, 0, 0.25); }
.badge.personal { background: rgba(189, 147, 249, 0.15); color: var(--color-personal); border: 1px solid rgba(189, 147, 249, 0.25); }

.note-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.note-title-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.note-title {
  font-family: var(--hud);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #fff;
}
.note-meta {
  font-size: 9px;
  color: var(--textdim);
  letter-spacing: 1px;
}
.note-content-area {
  font-size: 11.5px;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.8);
  white-space: pre-wrap;
  word-break: break-word;
  background: rgba(0, 4, 10, 0.4);
  padding: 8px 10px;
  border-radius: 2px;
  border: 1px solid rgba(255, 255, 255, 0.03);
  font-family: monospace;
}
.note-content-area.collapsed-lines {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}
.note-content-area.collapsed-lines:hover {
  border-color: rgba(0, 229, 255, 0.2);
}

.note-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
}
.note-btn {
  background: transparent;
  border: 1px solid rgba(0, 229, 255, 0.2);
  color: rgba(0, 229, 255, 0.6);
  font-size: 9px;
  padding: 4px 10px;
  font-family: var(--font);
  cursor: pointer;
  letter-spacing: 1px;
  border-radius: 2px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.note-btn:hover {
  border-color: #00e5ff;
  color: #00e5ff;
  background: rgba(0, 229, 255, 0.05);
}
.note-btn.btn-delete {
  border-color: rgba(255, 0, 60, 0.3);
  color: rgba(255, 0, 60, 0.6);
}
.note-btn.btn-delete:hover {
  border-color: #ff003c;
  color: #ff003c;
  background: rgba(255, 0, 60, 0.05);
}

/* Empty State */
.empty-state {
  padding: 40px 20px;
  text-align: center;
  background: rgba(0, 229, 255, 0.02);
  border: 1px dashed rgba(0, 229, 255, 0.15);
  font-family: monospace;
  font-size: 12px;
  color: rgba(0, 229, 255, 0.5);
  letter-spacing: 1px;
  border-radius: 2px;
}
</style>
</head>

<script>
let notes = [];
let selectedCategory = 'ALL';
let searchQuery = '';
const expandedNotes = new Set();

// Toggle composer form collapsible body
function toggleAddForm() {
  const body = document.getElementById('add-form-body');
  const btn = document.getElementById('add-form-toggle-btn');
  if (body.classList.contains('expanded')) {
    body.classList.remove('expanded');
    btn.textContent = '+ ADD NOTE';
  } else {
    body.classList.add('expanded');
    btn.textContent = 'COLLAPSE';
  }
}

// Load notes from localStorage or populate sample data
function loadNotes() {
  const stored = localStorage.getItem('cx_notes');
  if (stored) {
    try {
      notes = JSON.parse(stored);
    } catch (e) {
      notes = [];
    }
  } else {
    // Preload 3 sample notes on first visit
    notes = [
      {
        id: 'sample_1',
        title: 'Nmap Quick Reference',
        category: 'commands',
        content: 'nmap -sS -sV -O -p- 10.10.10.10\n# -sS: SYN Stealth Scan\n# -sV: Version detection\n# -O: OS fingerprinting\n# -p-: scan all 65535 ports\n\nnmap --script vuln 10.10.10.10\n# Run vulnerability scanning scripts',
        timestamp: new Date().toLocaleString()
      },
      {
        id: 'sample_2',
        title: 'Footprinting Tools',
        category: 'tools',
        content: '[+] Exiftool (metadata analysis):\nexiftool photo.jpg\n\n[+] Hunter.io (email harvesting):\nDomain query tool to fetch publicly available email contacts.\n\n[+] PhoneInfoga (phone number recon):\nphoneinfoga scan -n +1234567890',
        timestamp: new Date().toLocaleString()
      },
      {
        id: 'sample_3',
        title: 'OSI Layer Attacks',
        category: 'concepts',
        content: 'Layer 2 (Data Link): MAC Flooding, ARP Spoofing\nLayer 3 (Network): IP Spoofing, ICMP Flood (Smurf Attack)\nLayer 4 (Transport): TCP SYN Flood, Port Scanning\nLayer 7 (Application): SQL Injection, Cross-Site Scripting, HTTP GET/POST Flood',
        timestamp: new Date().toLocaleString()
      }
    ];
    localStorage.setItem('cx_notes', JSON.stringify(notes));
  }
}

// Save composer form note
function saveNote() {
  const titleEl = document.getElementById('note-title-input');
  const catEl = document.getElementById('note-cat-select');
  const contentEl = document.getElementById('note-content-input');
  
  const title = titleEl.value.trim();
  const category = catEl.value;
  const content = contentEl.value.trim();
  
  if (!title || !content) {
    alert('Please fill in both the note title and content.');
    return;
  }
  
  const newNote = {
    id: 'note_' + Date.now(),
    title: title,
    category: category,
    content: content,
    timestamp: new Date().toLocaleString()
  };
  
  notes.unshift(newNote);
  localStorage.setItem('cx_notes', JSON.stringify(notes));
  
  titleEl.value = '';
  contentEl.value = '';
  
  toggleAddForm();
  renderNotesList();
}

// Delete note records with user confirmation
function deleteNote(id) {
  if (confirm('Are you sure you want to delete this note?')) {
    notes = notes.filter(n => n.id !== id);
    localStorage.setItem('cx_notes', JSON.stringify(notes));
    renderNotesList();
  }
}

// Copy full content to clipboard and trigger temporal feedback
async function copyToClipboard(id, btnEl) {
  const note = notes.find(n => n.id === id);
  if (!note) return;
  try {
    await navigator.clipboard.writeText(note.content);
    const oldHTML = btnEl.innerHTML;
    btnEl.innerHTML = '⚡ COPIED!';
    btnEl.disabled = true;
    setTimeout(() => {
      btnEl.innerHTML = oldHTML;
      btnEl.disabled = false;
    }, 1500);
  } catch (err) {
    alert('Failed to copy. Clipboard access denied.');
  }
}

// AI Enhance note content using askGroq
async function enhanceNote(id, btnEl) {
  const note = notes.find(n => n.id === id);
  if (!note) return;
  
  const oldHTML = btnEl.innerHTML;
  btnEl.innerHTML = '🤖 ENHANCING...';
  btnEl.disabled = true;
  
  try {
    const prompt = `Enhance and expand these cybersecurity notes, add missing details, fix errors, add relevant commands or examples:\n\n${note.content}\n\nKeep hacker style. Under 300 words.`;
    const text = await askGroq(prompt);
    
    note.content = text;
    note.timestamp = new Date().toLocaleString() + ' (AI ENHANCED)';
    localStorage.setItem('cx_notes', JSON.stringify(notes));
    renderNotesList();
  } catch (e) {
    alert('[CONNECTION ERROR] ' + e.message + '\n\nCheck internet or Groq configuration.');
  }
  
  btnEl.innerHTML = oldHTML;
  btnEl.disabled = false;
}

// Toggle collapsed lines on notes content
function toggleExpand(id) {
  if (expandedNotes.has(id)) {
    expandedNotes.delete(id);
  } else {
    expandedNotes.add(id);
  }
  renderNotesList();
}

// Change search state on input event
function handleSearch(val) {
  searchQuery = val;
  renderNotesList();
}

// Category filter click event callback
function setCategoryFilter(cat) {
  selectedCategory = cat;
  document.querySelectorAll('.cx-chips .cx-chip').forEach(chip => {
    if (chip.textContent.trim().toUpperCase() === cat.toUpperCase()) {
      chip.classList.add('active');
    } else {
      chip.classList.remove('active');
    }
  });
  renderNotesList();
}

// Filter logic helper
function getFilteredNotes() {
  return notes.filter(n => {
    const matchCategory = (selectedCategory === 'ALL' || n.category.toUpperCase() === selectedCategory.toUpperCase());
    const matchSearch = (
      n.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
      n.content.toLowerCase().includes(searchQuery.toLowerCase())
    );
    return matchCategory && matchSearch;
  });
}

// Main rendering engine
function renderNotesList() {
  const container = document.getElementById('notes-list-container');
  const filtered = getFilteredNotes();
  
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        root@cyberx:~# No notes found. Add your first note above.
      </div>
    `;
    return;
  }
  
  container.innerHTML = '';
  filtered.forEach(n => {
    const isExpanded = expandedNotes.has(n.id);
    const card = document.createElement('div');
    card.className = `cx-card note-card category-${n.category} reveal`;
    
    card.innerHTML = `
      <div class="note-header">
        <div class="note-title-row">
          <div class="note-title">${escapeHTML(n.title)}</div>
          <div class="note-meta">${n.timestamp} <span style="opacity: 0.5;">(tap text to toggle full view)</span></div>
        </div>
        <span class="badge ${n.category}">${n.category}</span>
      </div>
      
      <div class="${isExpanded ? 'note-content-area' : 'note-content-area collapsed-lines'}" onclick="toggleExpand('${n.id}')">${escapeHTML(n.content)}</div>
      
      <div class="note-actions">
        <button class="note-btn" onclick="enhanceNote('${n.id}', this)">🤖 AI ENHANCE</button>
        <button class="note-btn" onclick="copyToClipboard('${n.id}', this)">📋 COPY</button>
        <button class="note-btn btn-delete" onclick="deleteNote('${n.id}')">🗑️ DELETE</button>
      </div>
    `;
    container.appendChild(card);
  });

  // Trigger scroll reveal for dynamically added notes
  if (window.IntersectionObserver) {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('vis');
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.notes-container .reveal').forEach(el => obs.observe(el));
  } else {
    document.querySelectorAll('.notes-container .reveal').forEach(el => el.classList.add('vis'));
  }
}

// Secure HTML escaping helper
function escapeHTML(str) {
  return str.replace(/[&<>'"]/g, 
    tag => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      "'": '&#39;',
      '"': '&quot;'
    }[tag] || tag)
  );
}

// Initialize note records on load, checking readyState to avoid race conditions
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    loadNotes();
    renderNotesList();
  });
} else {
  loadNotes();
  renderNotesList();
}
</script>
